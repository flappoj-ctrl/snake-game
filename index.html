<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Play Flappo Snake Game online for free! Mobile friendly snake game with high score tracking.">
<title>Flappo Snake Game</title>

<style>
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 { margin-top: 10px; }

#scoreBoard {
    font-size: 20px;
    margin: 10px;
}

canvas {
    background: black;
    border: 2px solid white;
    max-width: 100%;
}

.controls {
    margin: 15px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 18px;
    cursor: pointer;
}

.ad-container {
    margin: 20px auto;
    max-width: 728px;
    background: #111;
    padding: 10px;
}
</style>
</head>
<body>

<h1>🐍 Flappo Snake Game</h1>

<div id="scoreBoard">
    Score: <span id="score">0</span> |
    High Score: <span id="highScore">0</span>
</div>

<!-- TOP AD -->
<div class="ad-container">
    <!-- Paste Google AdSense code here -->
</div>

<canvas id="gameCanvas" width="600" height="450"></canvas>

<div class="controls">
    <button onclick="changeDirection('up')">⬆</button><br>
    <button onclick="changeDirection('left')">⬅</button>
    <button onclick="changeDirection('down')">⬇</button>
    <button onclick="changeDirection('right')">➡</button><br>
    <button onclick="restartGame()">Restart</button>
</div>

<!-- BOTTOM AD -->
<div class="ad-container">
    <!-- Second Ad Placement -->
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const SIZE = 25;
const SPEED = 100;

let snake, direction, food, score, highScore, gameInterval;

highScore = localStorage.getItem("snakeHighScore") || 0;
document.getElementById("highScore").textContent = highScore;

function initGame() {
    snake = [{x: SIZE*2, y: SIZE*2},{x: SIZE*2, y: SIZE},{x: SIZE*2, y: 0}];
    direction = "down";
    score = 0;
    document.getElementById("score").textContent = score;

    food = spawnFood();
    while (snake.some(part => part.x === food.x && part.y === food.y)) {
        food = spawnFood();
    }

    draw();

    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, SPEED);
}

function spawnFood() {
    return {
        x: Math.floor(Math.random() * (canvas.width / SIZE)) * SIZE,
        y: Math.floor(Math.random() * (canvas.height / SIZE)) * SIZE
    };
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, SIZE, SIZE);

    ctx.fillStyle = "blue";
    snake.forEach(part => {
        ctx.fillRect(part.x, part.y, SIZE, SIZE);
    });
}

function gameLoop() {
    const head = {...snake[0]};

    if (direction === "up") head.y -= SIZE;
    if (direction === "down") head.y += SIZE;
    if (direction === "left") head.x -= SIZE;
    if (direction === "right") head.x += SIZE;

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById("score").textContent = score;
        playBeep();
        food = spawnFood();
    } else {
        snake.pop();
    }

    if (checkCollision(head)) {
        gameOver();
        return;
    }

    draw();
}

function checkCollision(head) {
    if (head.x < 0 || head.x >= canvas.width ||
        head.y < 0 || head.y >= canvas.height)
        return true;

    for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y)
            return true;
    }
    return false;
}

function changeDirection(newDir) {
    if (newDir === "left" && direction !== "right") direction = newDir;
    if (newDir === "right" && direction !== "left") direction = newDir;
    if (newDir === "up" && direction !== "down") direction = newDir;
    if (newDir === "down" && direction !== "up") direction = newDir;
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") changeDirection("up");
    if (e.key === "ArrowDown") changeDirection("down");
    if (e.key === "ArrowLeft") changeDirection("left");
    if (e.key === "ArrowRight") changeDirection("right");
});

function gameOver() {
    clearInterval(gameInterval);

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("snakeHighScore", highScore);
        document.getElementById("highScore").textContent = highScore;
    }

    ctx.fillStyle = "red";
    ctx.font = "50px Arial";
    ctx.textAlign = "center";
    ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
}

function restartGame() {
    clearInterval(gameInterval);
    initGame();
}

function playBeep() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    oscillator.connect(audioCtx.destination);
    oscillator.frequency.value = 400;
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.1);
}



initGame();
</script>
<script
  async
  type="module"
  src="https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js">
</script>

  is-popup="true"
  chatbot-id="cmqc4t67x003i4dsfm2d5nxse">
</zapier-interfaces-chatbot-embed>

</body>
</html>
